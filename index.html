<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Smart Grid Management System | NEA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
    }

    /* animated background blobs */
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: rgba(67, 97, 238, 0.2);
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 450px;
      height: 450px;
      background: rgba(114, 9, 183, 0.15);
      border-radius: 50%;
      filter: blur(110px);
      z-index: 0;
    }

    .container {
      display: flex;
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.6);
      z-index: 2;
      transition: transform 0.2s;
    }

    /* ILLUSTRATION PANEL (modern, glass) */
    .illustration {
      flex: 1;
      background: linear-gradient(145deg, #4361ee, #3a0ca3);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .illustration::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 1%, transparent 1%);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .illustration i.fa-bolt {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      color: #ffd966;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
    }

    .illustration h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      letter-spacing: -0.3px;
    }

    .illustration p {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .feature-cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      width: 130px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.25);
      transition: transform 0.2s;
    }

    .feature-card i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .feature-card span {
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* AUTH CONTAINER */
    .auth-container {
      flex: 1;
      padding: 2.5rem 2.2rem;
      background: white;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      background: linear-gradient(135deg, #4361ee, #3a0ca3);
      width: 52px;
      height: 52px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.6rem;
      box-shadow: 0 10px 18px rgba(67, 97, 238, 0.25);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4361ee, #7209b7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .form-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.3rem;
    }

    .form-header p {
      color: #475569;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .input-with-icon {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #4361ee;
      font-size: 1.1rem;
      z-index: 2;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 3rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      background: #ffffff;
      outline: none;
    }

    .form-control:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
    }

    .password-toggle {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #6c757d;
      font-size: 1.2rem;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: #4361ee;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      background: linear-gradient(95deg, #4361ee, #3a56d4);
      color: white;
      margin-top: 0.8rem;
      box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
      box-shadow: 0 12px 24px rgba(67, 97, 238, 0.35);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-link {
      background: none;
      color: #4361ee;
      text-decoration: underline;
      font-weight: 600;
      box-shadow: none;
      margin-top: 0.5rem;
    }

    .btn-link:hover {
      background: none;
      transform: none;
      color: #3a0ca3;
      text-decoration: underline;
    }

    /* messages */
    #msg {
      padding: 0.8rem 1rem;
      border-radius: 60px;
      margin: 1rem 0;
      text-align: center;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .msg-error {
      background: #ffece6;
      color: #bc4e2c;
      border-left: 4px solid #f97316;
    }

    .msg-success {
      background: #e3f7e8;
      color: #006633;
      border-left: 4px solid #006633;
    }

    /* loading overlay */
    .loading {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2rem;
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .loading.active {
      opacity: 1;
      visibility: visible;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(67, 97, 238, 0.2);
      border-top: 4px solid #4361ee;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #6c757d;
      border-top: 1px solid #eef2f5;
      padding-top: 1.2rem;
    }

    .footer a {
      color: #4361ee;
      text-decoration: none;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 850px) {
      .container {
        max-width: 550px;
        flex-direction: column;
      }
      .illustration {
        display: none;
      }
      .auth-container {
        padding: 2rem 1.8rem;
      }
      .logo-text {
        font-size: 1.3rem;
      }
      .form-header h1 {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      .auth-container {
        padding: 1.5rem 1.2rem;
      }
      .form-control {
        padding: 0.8rem 1rem 0.8rem 2.8rem;
        font-size: 16px;
      }
      .input-icon {
        left: 14px;
      }
      .password-toggle {
        right: 12px;
      }
      .btn {
        padding: 0.8rem;
      }
      .logo-icon {
        width: 44px;
        height: 44px;
        font-size: 1.3rem;
      }
      .logo-text {
        font-size: 1.2rem;
      }
    }

    /* small devices */
    @media (max-width: 360px) {
      .auth-container {
        padding: 1.2rem 1rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="illustration">
    <i class="fas fa-bolt"></i>
    <h2>Smart Grid Access</h2>
    <p>Log in to monitor, control, and manage your substation in real-time with secure access.</p>
    <div class="feature-cards">
      <div class="feature-card">
        <i class="fas fa-network-wired"></i>
        <span>Live Grid Data</span>
      </div>
      <div class="feature-card">
        <i class="fas fa-plug"></i>
        <span>Remote Control</span>
      </div>
      <div class="feature-card">
        <i class="fas fa-chart-line"></i>
        <span>Analytics</span>
      </div>
    </div>
  </div>

  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">
        <i class="fas fa-fire"></i>
      </div>
      <div class="logo-text">Smart Grid management System</div>
    </div>

    <div class="form-header">
      <h1>Welcome Back</h1>
      <p>Sign in to continue to your account</p>
    </div>

    <div id="msg"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-with-icon">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="email" class="form-control" placeholder="Enter your email">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-with-icon">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="password" class="form-control" placeholder="Enter your password">
        <button class="password-toggle" id="togglePassword" type="button">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>

    <div style="text-align: center; margin-top: 15px;">
      <button class="btn btn-link" onclick="forgotPassword()">
        Forgot Password?
      </button>
    </div>

    <div class="footer">
      <p>By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMs4MtFfDVIFntC9hPYH_MClW1VsIJTZo",
    authDomain: "gridlogin.firebaseapp.com",
    databaseURL: "https://gridlogin-default-rtdb.firebaseio.com/",
    projectId: "gridlogin",
    storageBucket: "gridlogin.firebasestorage.app",
    messagingSenderId: "860236561452",
    appId: "1:860236561452:web:3b63bb006b0858b3426589"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // DOM elements
  const loading = document.getElementById('loading');
  const togglePassword = document.getElementById('togglePassword');
  const passwordField = document.getElementById('password');
  const msgElement = document.getElementById('msg');

  // Toggle password visibility
  togglePassword.addEventListener('click', function() {
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
  });

  // Show loading indicator
  function showLoading() {
    loading.classList.add('active');
  }

  // Hide loading indicator
  function hideLoading() {
    loading.classList.remove('active');
  }

  // Show message
  function showMsg(msg, success = false) {
    msgElement.innerText = msg;
    msgElement.className = success ? 'msg-success' : 'msg-error';
    setTimeout(() => {
      msgElement.innerText = '';
      msgElement.className = '';
    }, 5000);
  }

  // Login function
  window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
  
    if (!email || !password) {
      showMsg("Please fill in all fields");
      return;
    }
  
    showLoading();
  
    signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    hideLoading();

    const userEmail = auth.currentUser.email;

    if (
      userEmail === "mainahiya132ss@gmail.com" ||
      userEmail === "abc2@gmail.com"
    ) {
      window.location.href = "mainahiya.html";
    }
    else if (
      userEmail === "xyz@gmail.com" ||
      userEmail === "xyz2@gmail.com"
    ) {
      window.location.href = "xyz.html";
    }
    else {
      window.location.href = "home.html";
    }

  })
  .catch(error => {
    hideLoading();
    showMsg(error.message);
  });
  };

  // Forgot password function
  window.forgotPassword = function () {
    const email = document.getElementById("email").value;
  
    if (!email) {
      showMsg("Please enter your email address");
      return;
    }
  
    showLoading();
  
    sendPasswordResetEmail(auth, email)
      .then(() => {
        hideLoading();
        showMsg("Password reset link sent to your email", true);
      })
      .catch(error => {
        hideLoading();
        showMsg(error.message);
      });
  };

  // Redirect if already logged in
  onAuthStateChanged(auth, user => {
    if (user) {
      const userEmail = user.email;
      if (
        userEmail === "mainahiya132ss@gmail.com" ||
        userEmail === "abc2@gmail.com"
      ) {
        window.location.href = "mainahiya.html";
      }
      else if (
        userEmail === "xyz@gmail.com" ||
        userEmail === "xyz2@gmail.com"
      ) {
        window.location.href = "xyz.html";
      }
      else {
        window.location.href = "home.html";
      }
    }
  });
</script>
</body>
</html>
